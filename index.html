<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind + daisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <link rel="stylesheet" href="index.css">
    <title>PH-Job-Tracker</title>
</head>
<body>

    <header class="p-4">
        <h1 class="font-bold text-2xl my-4"> JOB APPLICATION TRACKER</h1>
        <div class="job-dashbord grid grid-cols-3 grid-rows-1 gap-5 p-3">
            <div class="card bg-base-100 card-xs shadow-sm">
             
             <h3>Total</h3>
              <p class=" font-bold">8</p>
        </div>
        <div class="card bg-base-100 card-xs shadow-sm p-4">
            <h3>Interview</h3>
             <p class="text-green-500 font-bold">0</p>
            
        </div>
        <div class="card bg-base-100 card-xs shadow-sm p-4">
            <h3>Rejected</h3>
              <p class="text-red-500 font-bold">0</p>
             
        </div>
        </div>
        
        <br>
    </header>

<section class="available-job mt-5 p-4">
    <h2 class="mb-3 font-bold  text-xl">Available Job</h2>
    
    
        <div class="bg-base-100 card-xs shadow-lg p-3">
            <button class="btn btn-soft btn-primary btn-active">All</button>
            <button class="btn btn-soft btn-primary">Interview</button>
            <button class="btn btn-soft btn-primary">Rejected</button>
        <div class="card-body my-3">
            <h2 class="card-title text-[16px]">Mobile First Corp</h2>
            <p class="text-neutral-500 text-[14px]"> react Native Developer</p>

           <div class="badge badge-soft badge-md badge-primary">NOT APPLIED</div>

            <p class="text-neutral-500"> react Native Developer</p>
            <div class="">
                <p class="mb-2"> Lorem ipsum dolor sit amet consectetur, adipisicing elit. Nisi, tempora?</p>
            
            <button class="btn btn-outline btn-success">INTERVIEW</button>
            <button class="btn btn-outline btn-secondary ml-4">REJECTED</button>
            
            </div>
        </div>
        </div>
</section>
    
</body>
</html>
